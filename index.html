<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si PAI v2026</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Khusus agar saat dicetak otomatis berubah menjadi format dokumen resmi hitam-putih */
        @media print {
            body *, main, header, aside, section {
                display: none !important;
            }
            #area-cetak-lampiran-resmi {
                display: block !important;
                font-family: "Times New Roman", Times, serif !important;
                color: #000 !important;
                background: #fff !important;
                padding: 20px !important;
                width: 100% !important;
            }
            .tabel-print {
                width: 100% !important;
                border-collapse: collapse !important;
                margin-top: 15px !important;
            }
            .tabel-print th, .tabel-print td {
                border: 1px solid #000 !important;
                padding: 8px !important;
                font-size: 12px !important;
            }
            .tabel-print th {
                background-color: #f2f2f2 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                text-align: center !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">

    <!-- CONTAINER UTAMA -->
    <main class="max-w-4xl mx-auto p-6 mt-10">
        
        <!-- CARD FORM INPUT UTAMA (Kembali ke desain asli Anda yang rapi) -->
        <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-6">
            
            <div>
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">Input Data Perangkat Inti / Modul</h2>
                <hr class="mt-3 border-slate-200">
            </div>

            <!-- FORM INPUT DENGAN MAPPING DAN STRUKTUR ASLI -->
            <form id="formPerangkat" onsubmit="event.preventDefault();" class="flex flex-col gap-5">
                
                <div>
                    <label for="nama_perangkat" class="block text-xs font-bold text-slate-800 mb-2">Nama Perangkat / Modul</label>
                    <input type="text" id="nama_perangkat" value="Modul Switch Core Cisco 9300" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 font-semibold text-slate-700">
                </div>
                
                <div>
                    <label for="spesifikasi" class="block text-xs font-bold text-slate-800 mb-2">Spesifikasi Teknis</label>
                    <textarea id="spesifikasi" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-700 focus:outline-none focus:border-emerald-500 font-semibold leading-relaxed">24 Port UPOE, Network Advantage, 4x10G Uplink</textarea>
                </div>
                
                <div>
                    <label for="jumlah" class="block text-xs font-bold text-slate-800 mb-2">Jumlah (Qty)</label>
                    <input type="number" id="jumlah" value="2" class="w-40 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 font-bold text-slate-700">
                </div>
                
                <div>
                    <label for="keterangan" class="block text-xs font-bold text-slate-800 mb-2">Keterangan Tambahan</label>
                    <input type="text" id="keterangan" value="Untuk Ruang Data Center Utama" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 font-semibold text-slate-700">
                </div>

                <!-- AREA TOMBOL PILIHAN (Warna Biru & Hijau Sesuai Gambar Anda) -->
                <div class="flex gap-3 mt-4">
                    <button type="button" onclick="simpanDataLokal()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-3 rounded-xl transition shadow-sm cursor-pointer">
                        Simpan Data
                    </button>
                    <button type="button" onclick="eksekusiCetakLampiran()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-5 py-3 rounded-xl transition shadow-sm cursor-pointer flex items-center gap-2">
                        <i class="fa-solid fa-print"></i> Cetak Sesuai Lampiran
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- ==========================================================================
       TEMPLATE DOKUMEN DENGAN FORMAT FORMAT RESMI (TERSEMBUNYI SAAT DI LAYAR)
       ========================================================================== -->
    <div id="area-cetak-lampiran-resmi" style="display: none;">
        <div style="text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px;">
            <h2 style="margin: 0; font-size: 18px; text-transform: uppercase;">Laporan Inventaris Perangkat Inti & Modul</h2>
            <p style="margin: 5px 0 0 0; font-size: 12px;">Format Cetak Resmi - Lampiran Dokumen Teknis</p>
        </div>

        <p style="font-size: 12px;"><strong>Tanggal Cetak:</strong> <span id="print-tanggal"></span></p>

        <table class="tabel-print">
            <thead>
                <tr>
                    <th style="width: 5%;">No</th>
                    <th style="width: 35%;">Nama Perangkat / Modul</th>
                    <th style="width: 35%;">Spesifikasi Teknis</th>
                    <th style="width: 10%;">Jumlah</th>
                    <th style="width: 15%;">Keterangan</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align: center;">1</td>
                    <td id="print-nama"></td>
                    <td id="print-spesifikasi"></td>
                    <td style="text-align: center;" id="print-jumlah"></td>
                    <td id="print-keterangan"></td>
                </tr>
            </tbody>
        </table>

        <div style="margin-top: 50px; float: right; text-align: center; width: 250px; font-size: 12px;">
            <p>Jakarta, <span id="print-tgl-ttd"></span></p>
            <p>Petugas Pemeriksa,</p>
            <div style="height: 70px;"></div>
            <p><strong>( ___________________________ )</strong></p>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIKA PENGHUBUNG -->
    <script>
        function eksekusiCetakLampiran() {
            // Mengambil value dari form input orisinil tanpa merusaknya
            const nama = document.getElementById('nama_perangkat').value;
            const spesifikasi = document.getElementById('spesifikasi').value;
            const jumlah = document.getElementById('jumlah').value;
            const keterangan = document.getElementById('keterangan').value;
            
            // Format Tanggal Indonesia otomatis
            const hariIni = new Date();
            const opsiTanggal = { year: 'numeric', month: 'long', day: 'numeric' };
            const tanggalTerformat = hariIni.toLocaleDateString('id-ID', opsiTanggal);

            // Suntik data ke template resmi cetak
            document.getElementById('print-nama').innerText = nama;
            document.getElementById('print-spesifikasi').innerText = spesifikasi;
            document.getElementById('print-jumlah').innerText = jumlah;
            document.getElementById('print-keterangan').innerText = keterangan;
            document.getElementById('print-tanggal').innerText = tanggalTerformat;
            document.getElementById('print-tgl-ttd').innerText = tanggalTerformat;

            // Panggil fungsi print bawaan browser
            window.print();
        }

        function simpanDataLokal() {
            alert("Data berhasil disimpan ke sistem lokal.");
        }
    </script>
</body>
</html>
